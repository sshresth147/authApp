server:
  port: 8081

#database
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root

    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    ##NEEDED FOR PRODUCTION ENVIRONMENT
